<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="181" height="209"><svg viewBox="0 0 181 209" width="181" height="209">
  <defs>
    <clipPath id="hex-clip">
      <polygon points="90.5,1 180,53 180,157 90.5,209 1,157 1,53"></polygon>
    </clipPath>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1"></stop>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#F39C12;stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Hex background -->
  <polygon points="90.5,1 180,53 180,157 90.5,209 1,157 1,53" fill="url(#bg-grad)" stroke="#3498DB" stroke-width="3"></polygon>

  <!-- Scatter plot dots -->
  <g clip-path="url(#hex-clip)" opacity="0.5">
    <!-- Cluster of data points simulating a regression scatter -->
    <circle cx="38" cy="148" r="3" fill="#ecf0f1"></circle>
    <circle cx="45" cy="140" r="3" fill="#ecf0f1"></circle>
    <circle cx="42" cy="155" r="3" fill="#ecf0f1"></circle>
    <circle cx="52" cy="135" r="3" fill="#ecf0f1"></circle>
    <circle cx="55" cy="145" r="3" fill="#ecf0f1"></circle>
    <circle cx="58" cy="128" r="3" fill="#ecf0f1"></circle>
    <circle cx="63" cy="138" r="3" fill="#ecf0f1"></circle>
    <circle cx="66" cy="125" r="3" fill="#ecf0f1"></circle>
    <circle cx="70" cy="130" r="3" fill="#ecf0f1"></circle>
    <circle cx="72" cy="118" r="3" fill="#ecf0f1"></circle>
    <circle cx="78" cy="122" r="3" fill="#ecf0f1"></circle>
    <circle cx="82" cy="115" r="3" fill="#ecf0f1"></circle>
    <circle cx="85" cy="120" r="3" fill="#ecf0f1"></circle>
    <circle cx="90" cy="108" r="3" fill="#ecf0f1"></circle>
    <circle cx="95" cy="112" r="3" fill="#ecf0f1"></circle>
    <circle cx="98" cy="100" r="3" fill="#ecf0f1"></circle>
    <circle cx="102" cy="105" r="3" fill="#ecf0f1"></circle>
    <circle cx="108" cy="98" r="3" fill="#ecf0f1"></circle>
    <circle cx="110" cy="105" r="3" fill="#ecf0f1"></circle>
    <circle cx="115" cy="92" r="3" fill="#ecf0f1"></circle>
    <circle cx="118" cy="95" r="3" fill="#ecf0f1"></circle>
    <circle cx="122" cy="88" r="3" fill="#ecf0f1"></circle>
    <circle cx="128" cy="85" r="3" fill="#ecf0f1"></circle>
    <circle cx="130" cy="92" r="3" fill="#ecf0f1"></circle>
    <circle cx="135" cy="80" r="3" fill="#ecf0f1"></circle>
    <circle cx="140" cy="78" r="3" fill="#ecf0f1"></circle>
    <circle cx="143" cy="85" r="3" fill="#ecf0f1"></circle>
  </g>

  <!-- Regression line -->
  <line x1="32" y1="158" x2="148" y2="72" stroke="url(#line-grad)" stroke-width="3.5" stroke-linecap="round" clip-path="url(#hex-clip)"></line>

  <!-- Confidence band -->
  <polygon points="32,150 148,62 148,82 32,166" fill="#E74C3C" opacity="0.12" clip-path="url(#hex-clip)"></polygon>

  <!-- Package name -->
  <text x="90.5" y="48" text-anchor="middle" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#ecf0f1" letter-spacing="1">reg</text>
  <text x="90.5" y="48" text-anchor="middle" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#3498DB" letter-spacing="1" dx="22">datasets</text>

  <!-- Combined text for clean rendering -->
  <text x="90.5" y="180" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="10" fill="#95a5a6" letter-spacing="0.5">lm(y ~ x, data)</text>

  <!-- Subtitle -->
  <text x="90.5" y="195" text-anchor="middle" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="8.5" fill="#7f8c8d">25 datasets for regression</text>

  <!-- Y-hat symbol -->
  <text x="90.5" y="68" text-anchor="middle" font-family="'Times New Roman', serif" font-size="14" font-style="italic" fill="#F39C12">ŷ</text>
</svg></svg>